name: publish

on:
  release:
    types:
      - published

# Drop all permissions at the top level; the publish job re-grants only what it needs.
permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # JSR OIDC provenance publishing

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      - name: Format check
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Type check
        run: deno task check

      - name: Test
        # GitHub runners have no WebGPU adapter; run the CPU-only suite.
        # `*.gpu.test.ts` is excluded by the `test:cpu` task.
        run: deno task test:cpu

      - name: Publish to JSR
        run: deno publish
